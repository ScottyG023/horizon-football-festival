name: Website feedback
description: Suggest a change or report something that looks off
labels: ["feedback"]
body:
  - type: dropdown
    id: page
    attributes:
      label: Which page?
      options:
        - Home
        - About Horizon
        - Tournament Info
        - Register
        - Multiple / general
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: What would you like to change?
      description: Plain English is fine — copy edits, layout tweaks, photo swaps, missing info, anything.
      placeholder: e.g. The hero image should be the team photo from last year, and the FAQ should mention the entry fee of $X
    validations:
      required: true
  - type: textarea
    id: priority
    attributes:
      label: How important / urgent?
      placeholder: e.g. Must-fix before board presentation on Monday / Nice-to-have / Just an idea
